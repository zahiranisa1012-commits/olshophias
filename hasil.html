<section class="container">
<h1>Data Pembelian</h1>

<p>Nama: <span id="nama"></span></p>
<p>Email: <span id="email"></span></p>

<h2>Pesanan:</h2>
<ul id="pesanan"></ul>

<h3>Total: Rp <span id="total"></span></h3>

<a href="index.html">Kembali</a>
</section>

<script>
let user=JSON.parse(localStorage.getItem("user"));
let cart=JSON.parse(localStorage.getItem("cart"))||[];

document.getElementById("nama").innerText=user.nama;
document.getElementById("email").innerText=user.email;

let total=0;

cart.forEach(item=>{
let li=document.createElement("li");
li.innerText=item.nama+" - Rp "+item.harga;
document.getElementById("pesanan").appendChild(li);
total+=item.harga;
});

document.getElementById("total").innerText=total;

// reset setelah selesai
localStorage.removeItem("cart");
</script>
